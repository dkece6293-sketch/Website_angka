<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(90deg, #00d2ff 0%, #3a47d5 100%);
      }
      nav {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 10px 20px;
        border-bottom: 2px solid #333;
        background: linear-gradient(
          90deg,
          rgba(42, 123, 155, 1) 0%,
          rgba(87, 199, 133, 1) 50%,
          rgba(237, 221, 83, 1) 100%
        );
      }
      section {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 90vh;
      }
      .card {
        padding: 20px;
        color: #fff;
        /* background: #8888883f; */
        max-width: 300px;
        background: linear-gradient(90deg, #d53369 0%, #daae51 100%);
        border: 2px solid #000;
        display: grid;
        justify-items: center;
        align-items: center;
        text-align: center;
        border-radius: 10px;
      }
      img {
        border-radius: 100%;
        margin: 10px;
        width: 100px;
      }
      .sosial-media {
        padding: 10px;
      }
      a {
        text-decoration: none;
        color: #000000;
      }
    </style>
  </head>
  <body>
    <nav>
      <h1>Website Kami</h1>
    </nav>
    <section>
      <div class="card">
        <img
          src="https://www.shutterstock.com/image-vector/default-avatar-social-media-display-600nw-2632690107.jpg"
          alt="Profile"
        />
        <h2>Profile</h2>
        <p>Hai saya seorang developer</p>
        <p>Saya Ingin Belajar lebih dalam tentang ilmu IT</p>
        <div class="sosial-media">
          <a href="www.youtube.com">youtube</a>
          <a href="www.instagram.com">Instagram</a>
          <a href="www.tiktok.com">Tiktok</a>
        </div>
      </div>
    </section>
  </body>
</html>
